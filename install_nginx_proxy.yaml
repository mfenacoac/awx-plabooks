---
- name: Despliegue de Nginx Proxy y NSSM (Versión Blindada)
  hosts: all
  gather_facts: no

  vars:
    # ---------------------------------------------------------
    # VARIABLES GENERALES
    # ---------------------------------------------------------
    zip_url: "https://github.com/mfenacoac/awx-plabooks/releases/download/Grafana/Instaladores.zip"
    zip_file: "Instaladores.zip"
    temp_dir: "C:\\Temp_Instaladores"
    
    nginx_install_dir: "C:\\nginx"
    nssm_install_dir: "C:\\nssm"
    nssm_exe: "C:\\nssm\\win64\\nssm.exe"

  tasks:

  # =======================================================================
  # FASE 0 Y 1: LIMPIEZA Y PREPARACIÓN
  # =======================================================================
  - name: Eliminar temporales previos para asegurar un entorno limpio
    ansible.windows.win_file:
      path: "{{ temp_dir }}"
      state: absent

  - name: Crear directorios base de instalación
    ansible.windows.win_file:
      path: "{{ item }}"
      state: directory
    loop:
      - "{{ temp_dir }}"
      - "{{ nginx_install_dir }}"
      - "{{ nssm_install_dir }}"

  # =======================================================================
  # FASE 2: DESCARGA DEL PAQUETE MAESTRO
  # =======================================================================
  - name: Descargar Instaladores.zip en AWX
    delegate_to: localhost
    run_once: true
    get_url:
      url: "{{ zip_url }}"
      dest: "/tmp/{{ zip_file }}"
      mode: '0644'

  - name: Transferir Instaladores.zip a los servidores Windows
    ansible.windows.win_copy:
      src: "/tmp/{{ zip_file }}"
      dest: "{{ temp_dir }}\\{{ zip_file }}"

  # =======================================================================
  # FASE 3: EXTRACCIÓN INTELIGENTE Y REESTRUCTURACIÓN
  # =======================================================================
  - name: Descomprimir paquete maestro y extraer Nginx/NSSM automáticamente
    ansible.windows.win_shell: |
      $TempDir = "C:\Temp_Instaladores"
      $Extracted = "$TempDir\Extracted"
      
      # 1. Extraer paquete maestro
      Expand-Archive -Path "$TempDir\Instaladores.zip" -DestinationPath $Extracted -Force
      
      # 2. Buscar nginx.zip recursivamente y extraerlo
      $NginxZip = Get-ChildItem -Path $Extracted -Filter "nginx.zip" -Recurse | Select-Object -First 1
      if ($NginxZip) {
          Expand-Archive -Path $NginxZip.FullName -DestinationPath "$Extracted\nginx_temp" -Force
          # Usamos comodín (*) para no depender de la versión (1.28.2)
          Copy-Item -Path "$Extracted\nginx_temp\nginx-*\*" -Destination "C:\nginx" -Recurse -Force
      } else {
          Throw "No se encontró nginx.zip dentro de Instaladores.zip"
      }

      # 3. Buscar nssm.zip recursivamente y extraerlo
      $NssmZip = Get-ChildItem -Path $Extracted -Filter "nssm.zip" -Recurse | Select-Object -First 1
      if ($NssmZip) {
          Expand-Archive -Path $NssmZip.FullName -DestinationPath "$Extracted\nssm_temp" -Force
          Copy-Item -Path "$Extracted\nssm_temp\nssm-*\*" -Destination "C:\nssm" -Recurse -Force
      } else {
          Throw "No se encontró nssm.zip dentro de Instaladores.zip"
      }

  # =======================================================================
  # FASE 4: CONFIGURACIÓN Y CREACIÓN DEL SERVICIO
  # =======================================================================
  - name: Aplicar nginx.conf dinámico
    ansible.windows.win_template:
      src: templates/nginx.conf.j2
      dest: "{{ nginx_install_dir }}\\conf\\nginx.conf"
      force: yes

  - name: Verificar si el servicio NginxProxy ya existe
    ansible.windows.win_service_info:
      name: NginxProxy
    register: nginx_service_info

  - name: Crear servicio NginxProxy con NSSM
    ansible.windows.win_shell: |
      & "{{ nssm_exe }}" install NginxProxy "{{ nginx_install_dir }}\nginx.exe"
      & "{{ nssm_exe }}" set NginxProxy AppDirectory "{{ nginx_install_dir }}"
      & "{{ nssm_exe }}" set NginxProxy Description "Proxy Inverso Nginx para Grafana Alloy"
    when: not nginx_service_info.exists

  - name: Iniciar servicio NginxProxy
    ansible.windows.win_service:
      name: NginxProxy
      state: restarted
      start_mode: auto

  # =======================================================================
  # FASE 5: LIMPIEZA
  # =======================================================================
  - name: Limpiar instaladores temporales
    ansible.windows.win_file:
      path: "{{ temp_dir }}"
      state: absent
